<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="
            width=device-width,
            initial-scale=1.0,
            maximum-scale=1.0,
            user-scalable=no
        "
    >

    <title>バルーンシューター</title>

    <style>

        * {
            box-sizing: border-box;

            margin: 0;
            padding: 0;

            touch-action: manipulation;

            -webkit-user-select: none;
            user-select: none;
        }

        html,
        body {
            width: 100%;
            height: 100%;

            overflow: hidden;
        }

        body {
            display: flex;

            align-items: center;
            justify-content: center;

            background:
                radial-gradient(
                    circle at top,
                    #32824a,
                    #0c2e1c 72%
                );

            font-family:
                "Arial Rounded MT Bold",
                "Hiragino Maru Gothic ProN",
                sans-serif;

            color: white;
        }

        #controller {
            display: flex;

            width: 100%;
            height: 100%;

            padding: 30px 22px;

            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        h1 {
            margin-bottom: 15px;

            font-size:
                clamp(
                    25px,
                    8vw,
                    42px
                );

            text-align: center;

            text-shadow:
                0 4px 3px
                rgba(0, 0, 0, 0.4);
        }

        #guide {
            margin-bottom: 28px;

            font-size: 17px;

            text-align: center;

            opacity: 0.9;
        }

        #fireButton {
            width:
                min(68vw, 290px);

            height:
                min(68vw, 290px);

            border:
                9px solid white;

            border-radius: 50%;

            background:
                radial-gradient(
                    circle at 40% 32%,
                    #ffba56,
                    #f36c20 52%,
                    #b93412 100%
                );

            color: white;

            font-size:
                clamp(
                    38px,
                    12vw,
                    63px
                );

            font-weight: bold;

            letter-spacing: 2px;

            text-shadow:
                0 4px 3px
                rgba(87, 25, 4, 0.5);

            box-shadow:
                0 13px 0 #7d240d,
                0 20px 36px
                rgba(0, 0, 0, 0.48),
                inset 0 8px 9px
                rgba(255, 255, 255, 0.3);

            cursor: pointer;

            transition:
                transform 0.08s ease,
                box-shadow 0.08s ease;
        }

        #fireButton:active,
        #fireButton.pressed {
            transform:
                translateY(10px)
                scale(0.95);

            box-shadow:
                0 3px 0 #7d240d,
                0 8px 15px
                rgba(0, 0, 0, 0.35),
                inset 0 5px 8px
                rgba(255, 255, 255, 0.2);
        }

        #fireButton:disabled {
            filter: grayscale(0.8);

            opacity: 0.6;
        }

        #status {
            margin-top: 38px;

            min-width: 210px;

            padding: 11px 20px;

            border:
                2px solid
                rgba(255, 255, 255, 0.75);

            border-radius: 22px;

            background:
                rgba(0, 0, 0, 0.35);

            font-size: 17px;
            font-weight: bold;

            text-align: center;
        }

        #status.connected {
            color: #baffb9;
        }

        #status.error {
            color: #ffb4b4;
        }

    </style>
</head>

<body>

    <main id="controller">

        <h1>
            バルーンシューター
        </h1>

        <p id="guide">
            風船をねらってボタンを押そう！
        </p>

        <button
            id="fireButton"
            disabled
        >
            発射
        </button>

        <div id="status">
            接続中…
        </div>

    </main>

    <script
        type="module"
        src="phone.js?v=10"
    ></script>

</body>

</html>
