<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>ジャングルバルーンシューティング</title>
　　<link
    rel="stylesheet"
    href="style.css?v=50"
>
</head>
<body>

    <main id="game">
        <!-- タイトル -->
        <div id="title">
            ジャングルバルーンシューティング
        </div>

        <!-- 時間とスコア -->
        <div id="info">

            <div>
                のこり
                <span id="time">20</span>
                びょう
            </div>

            <div>
                スコア
                <span id="score">0</span>
            </div>

        </div>

        <!-- 遊び方 -->
        <div id="instruction">
            風船をねらって発射しよう！
        </div>

        <!-- 風船を入れる場所 -->
        <div id="balloonArea"></div>

        <!-- 照準 -->
        <div id="scope"></div>

        <!-- 発射時の光 -->
        <div id="shotFlash"></div>

        <!-- カウントダウン -->
        <div id="countdown"></div>

        <!-- 接続状況 -->
        <div id="connectionStatus">

            <div>
                カメラ：
                <span id="cameraStatus">待機中</span>
            </div>

            <div>
                マーカー：
                <span id="markerStatus">未検出</span>
            </div>

            <div>
                コントローラー：
                <span id="firebaseStatus">接続中</span>
            </div>

        </div>

        <!-- 終了時の暗い背景 -->
        <div id="resultOverlay"></div>

        <!-- 終了メッセージ -->
        <div id="message"></div>
  <!-- ==================================================
     宝の地図ピースGET画面
   ================================================== -->
        <div id="rewardScreen">
        <div id="rewardTitle">
          宝の地図のピースGET！
       </div>
        <img
          id="mapPieceImage"
          src="images/map-piece.png"
          alt="宝の地図のピース"
         >
       </div>
        <!-- スタートボタン -->
        <button id="startButton">
            ゲームスタート
        </button>

    </main>

    <!--
        ?v=10はキャッシュ対策です。
        GitHub Pagesが古いJavaScriptを表示しにくくなります。
    -->
   <script
    type="module"
    src="script.js?v=11"
></script> 
</body>

</html>
